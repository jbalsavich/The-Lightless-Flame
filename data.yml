  - name: "Boogie Boots & the Percussion of Movement"
    img: "boogie-boots-and-the-percussion-of-movement"
    acqAt: 6
    prov: "William's wardrobe"
    holder: "William"
    description: "The gear of the College of Dance. William fights in rhythm."
  - name: "Staff of the Woodlands"
    img: "staff-of-the-woodlands"
    acqAt: 11
    prov: "Acquired in Zadash — Session 11"
    holder: "Erik, attuned"
