    acqAt: 30
    prov: "Taken from the hoard of the green dragons of Greenwatch — Session 30 — by an invisible rabbit"
    holder: "Worn and attuned: William"
    description: "Forged by an archdevil and built to bend wills. Dominate Monster three times a day, poison to anyone who strikes the wearer, and a deeper enchantment nobody can read. Asmodeus feared it enough to kill its maker. There is more."
