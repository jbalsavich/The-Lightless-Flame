  - name: "Cape of the Bat"
    img: "cape-of-the-bat"
    acqAt: 17
    prov: "Erik's shoulders"
    holder: "Erik, attuned"
    description: "Flight, feather fall, and extra stealth for a bird who already had plenty."
  - name: "Amulet of Proof against Detection and Location"
    img: "amulet-of-proof-against-detection-and-location"
    acqAt: 17
    prov: "Erik's neck"
    holder: "Erik, attuned"
    description: "The root's caretaker can't be scried or located by magic."
  - name: "Ring of CounterSpell"
    img: "ring-of-counterspell"
    acqAt: 11
    prov: "Erik's hand"
    holder: "Erik"
    description: "For when someone else's incantation needs to stop mid-sentence."
  - name: "Duergar Resonance Shield"
