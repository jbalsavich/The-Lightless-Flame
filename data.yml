# ---------------------------------------------------------------------
# Clues: Key mysteries and plot hooks on the clue board
# ---------------------------------------------------------------------
clues:
  - title: "A Gift, Once a Season"
    sinceAt: 47
    q: "'Because I like you, I’ll offer those boons free of charge once a season.'"
    description: "A letter from Velkora, carried to the castle by the courier Grimshaw, with a token returned that William had left behind. The contract is closed — and still she offers gifts. No price is named. That is what makes it worth fearing."
  - title: "The Grey in the Root"
    sinceAt: 47
    q: "‘Help me.’"
    description: "The World Tree root beneath the keep has gone grey and cold, a streak of it running the height of the wood. The node it guards is dying; the Tree spends itself to keep it alive. Touched, it pleads. Its keeper can steady it — but the grey only spreads when pressed, and will not lift until the source is stopped, far below."
  - title: "A Devil, the Drow, and the Red One"
    sinceAt: 47
    q: "What the Tree fears"
    description: "Asked how it might be saved, the root named the hands at its throat: a devil and her minions, the drow, and the red one. Three threats the party has heard before in other words — now spoken together, by the Tree itself."
  - title: "I'm Sorry, Red"
    sinceAt: 37
    q: "'I'm sorry, Red. — Sarah'"
    description: "Who is Sarah, what was she to Red, and what was she sorry for? A fire evoker's sword and spellbook left behind, a town that forgot her, and a letter that remembered."
  - title: "The Crown's Second Sentence"
    sinceAt: 31
    q: "'That's all I can tell you. But there's more.'"
    description: "The crown carries an enchantment deeper than any mortal reading. Only a devil or a god could explain it. Neither has been asked. Yet."
  - title: "Why, and By Whom"
    sinceAt: 30
    q: "'It seems to have been a trap. We do not know why or by who.'"
    description: "The party's own note on taking the crown. Someone wanted it taken, or wanted it found. Still unanswered since Session 30."
  - title: "The Mephis— Monolith"
    sinceAt: 24
    q: "Half a name on broken stone"
    description: "Standing on duchy land, older than the duchy, older than the kingdom. What did the missing half spell? Checked again on the road south: it cannot be lifted, sunk deep as bedrock, and the broken edge is worn smooth — by intent, or by ages. Magic lingers in it, of no school anyone can name."
  - title: "The Absence"
    sinceAt: 46
    q: "No Alistair at court"
    description: "Alistair was absent from the royal court. No word since."
  - title: "The Others Above Velraen"
    sinceAt: 40
    q: "'Including Marleaux. But not limited to.'"
    description: "The duergar named a hierarchy with its top in shadow. Thagram served Velraen. Velraen serves... whom?"
  - title: "The Chained Pit"
    sinceAt: 34
    q: "'Another dimension. Void, or the hells.'"
    description: "A bottomless hole beneath the keep, bound in chains older than memory. Even Silvanus wouldn't name its far end."
  - title: "The Unfinished Instrument"
    sinceAt: 34
    q: "'No forgefire without a song'"
    description: "A great instrument in the deep complex, missing its water parts, beside a pool, beside the founders' bones. Built to be played. Never finished. Or never restarted."
  - title: "The Keeper's Touch"
    sinceAt: 34
    q: "'Here labored the crew of Master Delruk, Fifth Keeper of the Root'"
    description: "The walls beneath Greenwatch use a familiar title, a thousand years before Titus stole it. Nobody has pulled this thread yet."

