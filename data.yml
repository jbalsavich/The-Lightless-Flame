# =====================================================================
# THE LIGHTLESS FLAME — CAMPAIGN DATABASE
# =====================================================================
# This file contains the complete records of the Greenwatch Campaign.
# Edit this file to add/update sessions, NPCs, vault items, clues, or maps.
# =====================================================================

# ---------------------------------------------------------------------
# Acts: Large narrative arcs of the campaign
# ---------------------------------------------------------------------
acts:
  - id: 1
    name: "Act I — The Circus and the City"
    range: "Sessions 1–11"
    color: "#c9a227"
  - id: 2
    name: "Act II — The Hunt for Titus"
    range: "Sessions 12–23"
    color: "#b08a2e"
  - id: 3
    name: "Act III — The Dukes of Greenwatch"
    range: "Sessions 24–38"
    color: "#9c6f2a"
  - id: 4
    name: "Act IV — The Deep and the Court"
    range: "Sessions 39–46"
    color: "#8c3524"

# ---------------------------------------------------------------------
# Sessions: The chronological session journal
# ---------------------------------------------------------------------
sessions:
  - id: 1
    act: 1
    title: "The Circus at Easterlaque"
    date: "Sep 2024"
    description: "A traveling circus comes to Easterlaque and things go bad fast. William, Erik, and Red meet in the aftermath and end up on the same road."
  - id: 2
    act: 1
    title: "The Deviltoad"
    date: "Sep 2024"
    description: "Mark the deviltoad admits he killed two people because he wanted to. Erik signs on as the group's guide. His price: adventure."
  - id: 3
    act: 1
    title: "The Road to Allfield"
    date: "Oct 2024"
    description: "Goblins on the road, Erik's first wildshape (an elk), and a fight alongside the Crownsguard against gnolls at Allfield."
  - id: 4
    act: 1
    title: "Zadash"
    date: "Oct 2024"
    description: "The party reaches Zadash. The Firefly Inn, the job board at the King's Hall, and a sewer pass from the High Richter."
  - id: 5
    act: 1
    title: "The Evening Nip"
    date: "Oct 2024"
    description: "They find the Evening Nip."
  - id: 6
    act: 1
    title: "The Knights of Requital"
    date: "Oct 2024"
    description: "Behind a door in the Leaky Tap: the Knights of Requital. Lord Sutan and the High Richter are allegedly corrupt, and a magic mirror shows Dolan is telling the truth."
  - id: 7
    act: 1
    title: "The Gentleman"
    date: "Oct 2024"
    description: "The Tri-Spires and the history of the three towers. First meeting with the Gentleman over a game of cards. He has a job: reopen a collapsed smuggling tunnel."
  - id: 8
    act: 1
    title: "The Myriad"
    date: "Nov 2024"
    description: "Business with the Myriad, Christina gets sent home, and the party registers for the Harvest Festival tournament."
  - id: 9
    act: 1
    title: "The Black-and-Red House"
    date: "Nov 2024"
    description: "Casing Lord Sutan's house in the north of the city. Two days until the festival."
  - id: 10
    act: 1
    title: "The Night the Roots Came"
    date: "Dec 2024"
    description: "The Pink Pony Club, a letter naming the High Richter, and a break-in at Lord Sutan's that gets cut short when a root the size of a street tears through Zadash. Giant red and black birds start taking people. Shadow is nearly one of them."
  - id: 11
    act: 1
    title: "The Legend of Titus"
    date: "Jan 2025"
    description: "The Gentleman retires into politics under a new name: Alistair Von Zeigaster. He hands the party a royal job, find the man calling himself Titus reborn, and tells the full thousand-year history of Titus and the Keepers of the Root. Shadow gets into Strixhaven."
  - id: 12
    act: 2
    title: "Provisions"
    date: "Jan 2025"
    description: "Shopping, bounty boards, and some questions about Zadash's pet trade."
  - id: 13
    act: 2
    title: "The Burned Circle"
    date: "Feb 2025"
    description: "Heading west: coins in a tree knot, a perfect burned circle, a wooden sphere with a poem inside it, and a stone giant the party ends up having to fight."
  - id: 14
    act: 2
    title: "Squak"
    date: "Feb 2025"
    description: "Gnolls in the night. Erik befriends a hawk named Squak. Cursed werefolk point the way to Scatterbones, a town friendly to the Keepers."
  - id: 15
    act: 2
    title: "Druids at the Tavern"
    date: "Feb 2025"
    description: "Four druids of the Keepers of the Root attack at the tavern. They lose."
  - id: 16
    act: 2
    title: "A Good Hawk"
    date: "Feb 2025"
    description: "Squak dies."
  - id: 17
    act: 2
    title: "The Dragon Egg"
    date: "Mar 2025"
    description: "The party wins over a friendly kobold clan and leaves with a dragon egg."
  - id: 18
    act: 2
    title: "Minnesota"
    date: "Mar 2025"
    description: "The kobolds turn out to be the start of something bigger: they head out across the continent recruiting the overlooked, and the army gets its name. Minnesota. In Cattlekeep, Red finds his uncle Clyde at the Hook, Line and Sinker, and the city's real ruler is named: Wolfram Malachi."
  - id: 19
    act: 2
    title: "The Steward's Contract"
    date: "Mar 2025"
    description: "A contract with Cattlekeep's leader sets the party against Malachi's men."
  - id: 20
    act: 2
    title: "The Wish"
    date: "Mar 2025"
    description: "The confrontation with Titus reborn. A Deck of Many Things gets opened mid-fight, and a barkeep ends the whole thing with a wish: Titus dies, and all the Keepers of the Root die with him."
  - id: 21
    act: 2
    title: "The Brother"
    date: "Apr 2025"
    description: "The truth comes out. The man wearing Titus's face was Erik's lost brother. With the last of his power, he shut the door beneath the world tree for good."
  - id: 22
    act: 2
    title: "Daylight"
    date: "Apr 2025"
    description: "Malachi gets dragged into open daylight on the plains and destroyed."
  - id: 23
    act: 2
    title: "The Crown Leaves Cattlekeep"
    date: "Apr 2025"
    description: "His captives are freed, Nyssa Greylark among them, and an ancient crown leaves the castle in the party's hands, taken to potentially use as a weapon. Theodric takes over Cattlekeep."
  - id: 24
    act: 3
    title: "The King's Grant"
    date: "Jun 2025"
    description: "An audience with King Aleric Valethorn the 5th. The party is granted the fort of Greenwatch. The catch: two green dragons live there."
  - id: 25
    act: 3
    title: "The Kollosensteins"
    date: "Jun 2025"
    description: "Back through Easterlaque, where three kobolds are freed from Red's family, the Kollosensteins. Minnesota is called to Greenwatch."
  - id: 26
    act: 3
    title: "Dinner with Marleaux"
    date: "Jul 2025"
    description: "Zadash again. Pumat Sol points them to Marleaux the Red, and a paper bird delivers a devil's name: Grimshaw. Shadow, Melethor, and Professor Sterling Pemberton join the trip home. Marleaux has the party over for dinner and confirms the ley lines are corrupted."
  - id: 27
    act: 3
    title: "The Lieutenants"
    date: "Aug 2025"
    description: "Minnesota's officers arrive, Rho Khetshypp, Aero Planes, and Stephen Rogers among them, and everyone trades histories around the fire."
  - id: 28
    act: 3
    title: "The End of Erik"
    date: "Aug 2025"
    description: "The dragon forest. Past a wall of thorns, surrounded and out of options, Erik trades his life for his friends' and lets the blade fall. Erik dies."
  - id: 29
    act: 3
    title: "The Return of Erik"
    date: "Aug 2025"
    description: "Erik wakes in the Seventh Circle, in Velkora's prison palace. He turns down her contract, maps the maze from memory, frees a powerful infernal named Raphael from the top floor, and comes home with red in his feathers. Back at Greenwatch, two devils put contracts on the table. William signs Velkora's: his silver tongue restored, payment owed in dragon."
  - n: 30 # Keeping original keys for numeric consistency in script reference if needed, but user requested n=id
  - id: 30
    act: 3
    title: "The Theft Mid-Battle"
    date: "Aug 2025"
    description: "The assault on the keep. Mid-fight, an invisible William lifts the crown from the dragons' hoard."
  - id: 31
    act: 3
    title: "What the Crown Is"
    date: "Oct 2025"
    description: "Velkora takes care of the other dragon herself. A natural 20 turns up the crown's history: forged by an archdevil, built to bend wills, and feared by Asmodeus enough that he killed its maker. Summary says whoever wears it at his fall claims the throne. A grove of the world tree speaks: come find me."
  - id: 32
    act: 3
    title: "One Less Friend"
    date: "Oct 2025"
    description: "Velkora's contract is completed and the dragon delivered. She wanted the crown too. The party keeps it, and now has one less friend in the hells."
  - id: 33
    act: 3
    title: "Ulf and Mila"
    date: "Oct 2025"
    description: "Erik picks up a dark mustang named Ulf, and a wounded blink dog named Mila decides to stay."
  - id: 34
    act: 3
    title: "The House Beneath the House"
    date: "Oct 2025"
    description: "Beneath the dining room: a buried dwarven complex. The chained ghosts of Marley and Marley, a bottomless pit bound in chains, an unfinished instrument missing its water parts, and walls signed by the crew of Master Delruk, Fifth Keeper of the Root. At the heart of it all, a living root of the World Tree on a node of the ley lines. William swears the tree's oath: protect the node, and never open a portal."
  - id: 35
    act: 3
    title: "There Is No Jeffrey"
    date: "Nov 2025"
    description: "Erik takes over care of the root. Red crystals turn green under fire. Marleaux's tower is just gone. In Richard's Vale, it turns out there is no Jeffrey, and there never was."
  - id: 36
    act: 3
    title: "The False Hydra"
    date: "Nov 2025"
    description: "A census, a merchant caravan, and a horror in the barrel room: a false hydra, killed. Among the dead nobody remembered: Tumble, of the Rough and Tumble. Erik buys maps of Zagarot's Merchant's Run."
  - id: 37
    act: 3
    title: "The Gate and the Letter"
    date: "Nov 2025"
    description: "The root turns out to be a gate. Opened with the crystals, it shows the Seventh Circle, and her. They close it. Christopher takes over the library, the Freeblade Commission signs on, and a destroyed caravan turns up smelling like Marleaux's vanished tower. In a vanished woman's room, a letter for Red: I'm sorry, Red. Sarah."
  - id: 38
    act: 3
    title: "The Walls of Zagarot"
    date: "Nov 2025"
    description: "A captured creature guides Erik to the walls of the sealed empire. The guide is shot dead from a tower. Erik flies away safely."
  - id: 39
    act: 4
    title: "The Machine"
    date: "Dec 2025"
    description: "The tremors lead to the Stonebriar mines: melted stone, duergar, and a machine shaking the earth. Chanticlear of the Emberhold thinks Marleaux the Red might be a lich. The party claims the Duergar Resonance Shield."
  - id: 40
    act: 4
    title: "V"
    date: "Dec 2025"
    description: "A captured duergar talks. The dig answers to Thagram. Thagram answers to Velraen, V, where the cold and power comes from. And above her there are others. Including Marleaux. But not limited to."
  - id: 41
    act: 4
    title: "The Death of Chanticlear"
    date: "Jan 2026"
    description: "Chanticlear is murdered by drow."
  - id: 42
    act: 4
    title: "Blue Corn"
    date: "Jan 2026"
    description: "Phelban Shelkesha, renamed Blue Corn and put under protection, confirms the hierarchy and the target: the machine is digging up, beneath Greenwatch, toward the root."
  - id: 43
    act: 4
    title: "Into the Underdark"
    date: "Jan 2026"
    description: "Down the trapped tunnel and through an illusory wall into the Underdark. William's drow disguise barely survives the local etiquette. He turns Red into a rat and pockets him; Red escapes the pocket and goes exploring on his own."
  - id: 44
    act: 4
    title: "Tal'Tutin"
    date: "Jan 2026"
    description: "The party befriends a purple worm the size of a river. Its name is Tal'Tutin."
  - id: 45
    act: 4
    title: "The Collapse"
    date: "Jan 2026"
    description: "The party escapes the collapsing tunnel. Thagram, notably, does not."
  - id: 46
    act: 4
    title: "The Throne of Power"
    date: "Jan 2026"
    description: "A paper bird, a royal court, and an accounting before the king. Granted: 25,000 gold, royal specialists, and a writ for six hundred settlers. Absent from court: Alistair Von Zeigaster."
  - id: 47
    act: 4
    title: "What Still Moves Beneath"
    date: "Jun 2026"
    description: "Home to a duchy in bloom — settlers on the road, taverns and a school and a theater raised, the gold of the crown set to work. But beneath the keep the great root has gone grey and cold, pouring itself out to keep a dying thing alive. It asked for help. It named what it feared. The road points down."

