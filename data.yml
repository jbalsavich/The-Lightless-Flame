# ---------------------------------------------------------------------
# Deepnodes: Underdark subterranean route nodes
# ---------------------------------------------------------------------
deepnodes:
  - name: "Greenwatch (The Way Down)"
    x: 150
    y: 90
    visited: true
    kind: "stop"
    blurb: "Home. The descent does not start here anymore. The dig tunnel under the keep is collapsed, so the only open way down is a half-day overland, in the Hearthgrove Vale."
  - name: "The Throat"
    x: 250
    y: 210
    visited: false
    kind: "stop"
    blurb: "A cave mouth in the Hearthgrove Vale, about half a day from the keep. This is the way in now. Bring rope and bring light; the first mile drops fast and the footing is bad."
  - name: "The Tollgate"
    x: 330
    y: 300
    visited: false
    kind: "stop"
    blurb: "Deep gnomes run a gate here and charge to pass. Pay what they ask, do not haggle, and do not let them count your party out loud. They sell rumors too, and most are even true."
  - name: "The Worm Road"
    x: 310
    y: 400
    visited: true
    kind: "stop"
    blurb: "Smooth tunnels bored by Tal'Tutin. You know him; he is friendly if he knows it is you. Make noise he recognizes before you enter, or he may take you for prey."
  - name: "The Sea of Glass Mushrooms"
    x: 430
    y: 480
    visited: false
    kind: "stop"
    blurb: "A glowing fungal forest. Do not eat anything, do not set fires, and if you hear singing, keep walking and do not answer it. The spores carry sound for miles."
  - name: "The Dead Hold of Karaz-Brim"
    x: 380
    y: 570
    visited: false
    kind: "stop"
    blurb: "A dead dwarven hold you have to pass through; there is no way around. The vault door only opens for an honest game, so play it straight and do not cheat. The hold keeps count."
  - name: "The Sunless Crossing"
    x: 300
    y: 660
    visited: false
    kind: "stop"
    blurb: "A black lake with a chain ferry. Cross in full darkness; do not use light of any kind on the water. Hold the chain, go slow, and ignore whatever knocks on the hull."
  - name: "The Grotto of Reaching Roots"
    x: 340
    y: 750
    visited: false
    kind: "stop"
    blurb: "A cavern where a root of the world tree reaches this deep. It is safe, and it may be important to Erik. I do not know why I am certain of that, but I am."
  - name: "The Drow Frontier"
    x: 310
    y: 840
    visited: false
    kind: "stop"
    blurb: "The border of Uth'tar. A black arch counts everyone who passes under it, so understand that once you cross, the queen knows you are coming. There is no sneaking past this."
  - name: "The Staging Grounds"
    x: 420
    y: 910
    visited: false
    kind: "stop"
    blurb: "Foundries and holding pens where the dig was supplied. If you want to know what they were building and who they answer to, the answers are here. So are a great many of them."
  - name: "Uth'tar, the Last Door"
    x: 400
    y: 975
    visited: false
    kind: "stop"
    blurb: "The queen's seat. Velraen is here, and this is where the cold and the power come from. I have been inside once. I will tell you what I remember, but not gladly."
  - name: "The Quiet Choir"
    x: 560
    y: 520
    visited: false
    kind: "dread"
    blurb: "I have not been here and I will not take you. If you hear voices singing together off the path, that is this place, and you should go the other way."
  - name: "The Stair That Goes Down"
    x: 560
    y: 950
    visited: false
    kind: "dread"
    blurb: "There is something below even the queen. I have never seen it. I still know it is there, and so does she. Do not go looking for it."
